<!DOCTYPE html>
<html>
<head>
  <title>Exam Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #1f4037, #99f2c8);
      color: white;
    }

    .navbar {
      background: rgba(0,0,0,0.7);
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      width: 220px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      background: #e3f2fd;
    }

    .question-box {
      background: white;
      color: black;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      animation: fadeIn 0.5s;
    }

    .option {
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      background: #f1f1f1;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover {
      background: #d0ebff;
    }

    input[type="radio"] {
      display: none;
    }

    input[type="radio"]:checked + span {
      display: block;
      background: #4caf50;
      color: white;
      padding: 10px;
      border-radius: 8px;
    }

    button {
      padding: 12px 20px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #ff9800;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e68900;
    }

    #chart {
      background: white;
      margin-top: 20px;
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="navbar">
  <h2>Exam Dashboard</h2>
  <h3 id="timer"></h3>
</div>

<div class="container" id="dashboard">

  <div class="grid">
    <div class="card" onclick="startTest('CPT')">
      <h3>CPT Test</h3>
      <p>Practice CPT Questions</p>
    </div>

    <div class="card" onclick="startTest('ICD')">
      <h3>ICD Test</h3>
      <p>Practice ICD Questions</p>
    </div>

    <div class="card" onclick="startTest('MOCK')">
      <h3>Mock Test</h3>
      <p>Mixed Exam</p>
    </div>

    <div class="card" onclick="showLeaderboard()">
      <h3>Leaderboard</h3>
    </div>

    <div class="card" onclick="showAnalytics()">
      <h3>Analytics</h3>
    </div>

    <div class="card" onclick="showResults()">
      <h3>Results</h3>
    </div>
  </div>

</div>

<div id="exam" class="container"></div>
<canvas id="chart"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>

// 🔴 PASTE YOUR CONFIG HERE
const firebaseConfig = { apiKey: "AIzaSyCrvXIwQgtvFRUe1GMIvf32PLE-VSnFoFc",
  authDomain: "exam-platform-b5d9d.firebaseapp.com",
  projectId: "exam-platform-b5d9d",
  storageBucket: "exam-platform-b5d9d.firebasestorage.app",
  messagingSenderId: "261585292868",
  appId: "1:261585292868:web:adee3e2ab839e823fd7611",
  measurementId: "G-GJEB3ZDQX6"};
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let questions = [];
let answers = {};
let time = 300;

// START TEST
async function startTest(type){
  document.getElementById("dashboard").style.display="none";

  const settings = await db.collection("settings").doc(type).get();
time = settings.exists ? settings.data().time : 300;

  let query = db.collection("questions");

  if(type !== "MOCK"){
    query = query.where("type","==",type);
  }

  const snapshot = await query.get();
  questions = snapshot.docs.map(doc=>doc.data());

  loadQuestions();
  startTimer();
}

// LOAD QUESTIONS
function loadQuestions(){
  let html = "<h2>Exam Started</h2>";

  questions.forEach((q,i)=>{
    html += `<div class="question-box">
      <p><b>${i+1}. ${q.question}</b></p>`;

    q.options.forEach(opt=>{
      html += `
      <label>
        <input type="radio" name="q${i}" onclick="answer(${i}, '${opt}')">
        <span class="option">${opt}</span>
      </label>`;
    });

    html += "</div>";
  });

  html += `<button onclick="submitTest()">Submit Test</button>`;
  document.getElementById("exam").innerHTML = html;
}

// STORE ANSWER
function answer(i,opt){
  answers[i] = opt;
}

// TIMER
function startTimer(){
  const interval = setInterval(()=>{
    document.getElementById("timer").innerText = "Time: " + time + "s";

    if(time <= 0){
      clearInterval(interval);
      submitTest();
    }
    time--;
  },1000);
}

// SUBMIT TEST
async function submitTest(){
  let score = 0;

  questions.forEach((q,i)=>{
    if(answers[i] === q.answer) score++;
  });

  alert("Score: " + score + "/" + questions.length);

  await db.collection("results").add({
    score,
    total: questions.length,
    date: new Date()
  });

  location.reload();
}

// LEADERBOARD
async function showLeaderboard(){
  const snapshot = await db.collection("results")
  .orderBy("score","desc").limit(5).get();

  let html = "<h2>🏆 Leaderboard</h2>";

  snapshot.forEach(doc=>{
    const r = doc.data();
    html += `<p>Score: ${r.score}</p>`;
  });

  document.getElementById("exam").innerHTML = html;
}

// ANALYTICS
async function showAnalytics(){
  const snapshot = await db.collection("results").get();

  let scores = [];
  snapshot.forEach(doc=>scores.push(doc.data().score));

  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: scores.map((_,i)=>"Test "+(i+1)),
      datasets: [{ data: scores }]
    }
  });
}

// RESULTS
async function showResults(){
  const snapshot = await db.collection("results").get();

  let html = "<h2>Your Results</h2>";

  snapshot.forEach(doc=>{
    const r = doc.data();
    html += `<p>Score: ${r.score}/${r.total}</p>`;
  });

  document.getElementById("exam").innerHTML = html;
}

</script>

</body>
</html>
