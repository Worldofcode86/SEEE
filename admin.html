<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #ff512f, #dd2476);
      color: white;
      margin: 0;
    }

    .container {
      padding: 20px;
    }

    .box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 8px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .question {
      background: #f1f1f1;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">

<h2>Admin Panel</h2>

<!-- ADD QUESTION -->
<div class="box">
<h3>Add Question</h3>

<input id="question" placeholder="Question"><br>
<input id="opt1" placeholder="Option 1">
<input id="opt2" placeholder="Option 2"><br>
<input id="opt3" placeholder="Option 3">
<input id="opt4" placeholder="Option 4"><br>

<input id="answer" placeholder="Correct Answer"><br>

<select id="type">
  <option value="CPT">CPT</option>
  <option value="ICD">ICD</option>
  <option value="MOCK">MOCK</option>
</select><br>

<button onclick="addQuestion()">Add Question</button>
</div>

<!-- SET TIMER -->
<div class="box">
<h3>Set Timer</h3>

<select id="timerType">
  <option value="CPT">CPT</option>
  <option value="ICD">ICD</option>
  <option value="MOCK">MOCK</option>
</select>

<input id="time" placeholder="Time in seconds">

<button onclick="setTimer()">Set Timer</button>
</div>

<!-- VIEW QUESTIONS -->
<div class="box">
<h3>All Questions</h3>
<button onclick="loadQuestions()">Load Questions</button>

<div id="list"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>

// 🔴 PASSWORD PROTECTION
const pass = prompt("Enter Admin Password");
if(pass !== "admin123"){
  alert("Access Denied");
  document.body.innerHTML = "";
}

// 🔴 FIREBASE CONFIG
const firebaseConfig = { apiKey: "AIzaSyCrvXIwQgtvFRUe1GMIvf32PLE-VSnFoFc",
  authDomain: "exam-platform-b5d9d.firebaseapp.com",
  projectId: "exam-platform-b5d9d",
  storageBucket: "exam-platform-b5d9d.firebasestorage.app",
  messagingSenderId: "261585292868",
  appId: "1:261585292868:web:adee3e2ab839e823fd7611",
  measurementId: "G-GJEB3ZDQX6" };
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// ADD QUESTION
function addQuestion(){
  db.collection("questions").add({
    question: question.value,
    options: [opt1.value, opt2.value, opt3.value, opt4.value],
    answer: answer.value,
    type: type.value
  });

  alert("Question Added");
}

// SET TIMER
function setTimer(){
  db.collection("settings").doc(timerType.value).set({
    time: Number(time.value)
  });

  alert("Timer Updated");
}

// LOAD + DELETE QUESTIONS
async function loadQuestions(){
  const snapshot = await db.collection("questions").get();

  let html = "";

  snapshot.forEach(doc=>{
    const q = doc.data();

    html += `
    <div class="question">
      <p>${q.question}</p>
      <button onclick="deleteQ('${doc.id}')">Delete</button>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// DELETE QUESTION
function deleteQ(id){
  db.collection("questions").doc(id).delete();
  alert("Deleted");
  loadQuestions();
}

</script>

</body>
</html>
