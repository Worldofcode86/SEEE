<!DOCTYPE html>
<html>
<head>
  <title>ICD CPT Test Platform</title>
</head>
<body>

<h1>ICD / CPT Test</h1>

<!-- LOGIN -->
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<br><br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<h2 id="timer"></h2>
<div id="questions"></div>

<button onclick="submitTest()">Submit</button>

<!-- FIREBASE SDK (IMPORTANT LINKS) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>

// 🔴 PASTE YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyCrvXIwQgtvFRUe1GMIvf32PLE-VSnFoFc",
  authDomain: "exam-platform-b5d9d.firebaseapp.com",
  projectId: "exam-platform-b5d9d",
  storageBucket: "exam-platform-b5d9d.firebasestorage.app",
  messagingSenderId: "261585292868",
  appId: "1:261585292868:web:adee3e2ab839e823fd7611",
  measurementId: "G-GJEB3ZDQX6"
};

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let questions = [];
let answers = {};
let time = 300;

// REGISTER
function register(){
  auth.createUserWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  ).then(()=>alert("Registered Successfully"))
  .catch(err=>alert(err.message));
}

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  ).then(()=>{
    alert("Login Success");
    loadQuestions();
    startTimer();
  })
  .catch(err=>alert(err.message));
}

// LOAD QUESTIONS
async function loadQuestions(){
  const snapshot = await db.collection("questions").get();
  questions = snapshot.docs.map(doc => doc.data());

  let html = "";

  questions.forEach((q,i)=>{
    html += `<p><b>${i+1}. ${q.question}</b></p>`;
    q.options.forEach(opt=>{
      html += `<button onclick="answer(${i}, '${opt}')">${opt}</button><br>`;
    });
    html += "<br>";
  });

  document.getElementById("questions").innerHTML = html;
}

// STORE ANSWER
function answer(i,opt){
  answers[i] = opt;
}

// TIMER
function startTimer(){
  const interval = setInterval(()=>{
    document.getElementById("timer").innerText = "Time Left: " + time + " sec";

    if(time <= 0){
      clearInterval(interval);
      submitTest();
    }
    time--;
  },1000);
}

// SUBMIT TEST
function submitTest(){
  let score = 0;

  questions.forEach((q,i)=>{
    if(answers[i] === q.answer){
      score++;
    }
  });

  alert("Your Score: " + score);

  db.collection("results").add({
    score: score,
    total: questions.length,
    timeTaken: 300 - time,
    date: new Date()
  });
}

</script>

</body>
</html>
